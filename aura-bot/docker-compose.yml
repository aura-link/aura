services:
  aura-bot:
    build: .
    container_name: aura-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Mexico_City
    volumes:
      - ./data:/app/data
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512m
