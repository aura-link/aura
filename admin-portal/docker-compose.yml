services:
  admin-portal:
    build: .
    container_name: admin-portal
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - BOT_DB_PATH=/app/botdata/aura.db
      - ADMIN_DB_PATH=/app/data/admin.db
      - TZ=America/Mexico_City
    volumes:
      - ./data:/app/data
      - /root/aura-bot/data:/app/botdata:ro
      - /home/unms/data/cert:/app/certs:ro
      - /root/backups:/app/backups
      - /root/.ssh:/root/.ssh:ro
