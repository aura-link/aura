services:
  avisos-portal:
    build: .
    container_name: avisos-portal
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - BOT_DB_PATH=/app/botdata/aura.db
      - TZ=America/Mexico_City
    volumes:
      - /root/.ssh:/root/.ssh:ro
      - ./data:/app/data
      - /root/aura-bot/data:/app/botdata:ro
